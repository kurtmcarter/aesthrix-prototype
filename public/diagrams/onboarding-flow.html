<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthrix — New Patient Onboarding Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: #F7F4EF; color: #2C2118; min-height: 100vh; overflow: hidden; }

  header {
    background: #fff;
    border-bottom: 1px solid #EDE5D8;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.14em; color: #2C2118; }
  .doc-title { font-size: 11px; color: #9B8778; margin-top: 2px; }
  .meta { font-size: 11px; color: #9B8778; }

  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 8px 24px;
    background: #fff;
    border-bottom: 1px solid #EDE5D8;
  }
  .li { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6B5744; font-weight: 500; }
  .ld { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .hint { margin-left: auto; font-size: 11px; color: #9B8778; }

  .canvas-wrap {
    width: 100vw;
    height: calc(100vh - 84px);
    overflow: auto;
    cursor: grab;
    padding: 24px;
  }
  .canvas-wrap:active { cursor: grabbing; }

  #tooltip {
    position: fixed;
    background: #2C2118;
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    line-height: 1.6;
    padding: 10px 14px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 260px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .zoom-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 6px;
    z-index: 100;
  }
  .zb {
    width: 34px; height: 34px;
    background: #fff;
    border: 1px solid #EDE5D8;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #2C2118;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .zb:hover { background: #F7F4EF; }
</style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">AESTHRIX</div>
    <div class="doc-title">New Patient Onboarding — Happy path: left → right &nbsp;·&nbsp; Branches: drop below &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; +/− to zoom</div>
  </div>
  <div class="meta">Cloudsoft Labs · v2 · May 2026</div>
</header>

<div class="legend">
  <div class="li"><div class="ld" style="background:#2A7A6A;"></div>System / app</div>
  <div class="li"><div class="ld" style="background:#7A5AA0;"></div>Patient action</div>
  <div class="li"><div class="ld" style="background:#B8965A;"></div>Decision point</div>
  <div class="li"><div class="ld" style="background:#C4856A;"></div>Drop-off risk</div>
  <div class="li"><div class="ld" style="background:#3A6BA0;"></div>Activated state</div>
  <div class="hint">Hover any node for design notes</div>
</div>

<div id="tooltip"></div>

<div class="canvas-wrap" id="canvas">
  <div id="zoom-target" style="transform-origin:top left;display:inline-block;">
  <svg width="2240" height="580" viewBox="0 0 2240 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C9B99A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- PHASE BANDS -->
  <rect x="16"   y="14" width="195" height="410" rx="10" fill="#2A7A6A" opacity="0.07"/>
  <rect x="226"  y="14" width="215" height="410" rx="10" fill="#2A7A6A" opacity="0.07"/>
  <rect x="456"  y="14" width="350" height="410" rx="10" fill="#7A5AA0" opacity="0.07"/>
  <rect x="821"  y="14" width="350" height="410" rx="10" fill="#7A5AA0" opacity="0.07"/>
  <rect x="1186" y="14" width="215" height="410" rx="10" fill="#2A7A6A" opacity="0.07"/>
  <rect x="1416" y="14" width="415" height="410" rx="10" fill="#3A6BA0" opacity="0.07"/>
  <rect x="1846" y="14" width="378" height="410" rx="10" fill="#3A6BA0" opacity="0.07"/>

  <!-- Phase labels -->
  <text x="113"  y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#2A7A6A" font-family="Jost,sans-serif">ENTRY</text>
  <text x="333"  y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#2A7A6A" font-family="Jost,sans-serif">APP ACCESS</text>
  <text x="631"  y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#7A5AA0" font-family="Jost,sans-serif">ACCOUNT CREATION</text>
  <text x="996"  y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#7A5AA0" font-family="Jost,sans-serif">PROFILE SETUP</text>
  <text x="1293" y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#2A7A6A" font-family="Jost,sans-serif">WELCOME</text>
  <text x="1623" y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#3A6BA0" font-family="Jost,sans-serif">FIRST BOOKING</text>
  <text x="2035" y="34" text-anchor="middle" font-size="9" font-weight="500" letter-spacing="1.2" fill="#3A6BA0" font-family="Jost,sans-serif">ACTIVATED</text>

  <!-- ══ HAPPY PATH at y=160 ══ -->

  <!-- START -->
  <ellipse cx="90" cy="160" rx="56" ry="24" fill="#C9B99A"/>
  <text x="90" y="164" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Start</text>
  <line x1="146" y1="160" x2="174" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 1 Clinic sends invite -->
  <g class="node" data-tip="Clinic staff sends a WhatsApp or SMS invite with a personalised link. The link pre-fills the clinic ID so the patient is automatically associated on signup. Branding in the message is critical — patients must recognise the sender or they ignore it.">
    <rect x="174" y="136" width="205" height="48" rx="8" fill="#2A7A6A"/>
    <text x="276" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Clinic sends invite</text>
    <text x="276" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">WhatsApp / SMS · clinic link</text>
  </g>
  <line x1="379" y1="160" x2="412" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- D1 Opens link? -->
  <g class="node" data-tip="Drop-off risk #1. If the message looks generic or the patient doesn't recognise the sender, they ignore it. A personalised message from the doctor's name converts far better than a system-generated blast.">
    <polygon points="462,160 514,134 566,160 514,186" fill="#B8965A"/>
    <text x="514" y="164" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Opens?</text>
  </g>
  <!-- D1 No -->
  <line x1="514" y1="186" x2="514" y2="256" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="524" y="226" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">No</text>
  <g class="node" data-tip="Drop-off #1 — Patient ignores the invite. System sends a single auto follow-up after 24h. After second ignore, flag for manual clinic outreach. A WhatsApp from the actual doctor personally converts significantly better than a system message.">
    <rect x="464" y="256" width="100" height="44" rx="8" fill="#C4856A"/>
    <text x="514" y="272" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Ignores</text>
    <text x="514" y="289" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.75)" font-family="Jost,sans-serif">Drop-off #1</text>
  </g>
  <path d="M514 300 L514 360 L276 360 L276 184" fill="none" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="390" y="375" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Auto follow-up after 24h</text>
  <!-- D1 Yes -->
  <line x1="566" y1="160" x2="618" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="589" y="150" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Yes</text>

  <!-- 2 PWA opens -->
  <g class="node" data-tip="Link opens as a PWA (Progressive Web App) in the patient's browser. No App Store download required — this is critical for reducing friction. The clinic's branding appears within 3 seconds. The patient should see their clinic's logo, not Aesthrix branding.">
    <rect x="618" y="136" width="185" height="48" rx="8" fill="#2A7A6A"/>
    <text x="710" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Web app opens</text>
    <text x="710" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">PWA · no App Store needed</text>
  </g>
  <line x1="803" y1="160" x2="835" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 3 Enter mobile -->
  <g class="node" data-tip="Patient enters their Saudi mobile number (+966 pre-filled). This is the primary identity — it matches what the clinic already has on file, creating an instant patient record association. Open numeric keyboard automatically.">
    <rect x="835" y="136" width="185" height="48" rx="8" fill="#7A5AA0"/>
    <text x="927" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Enter mobile number</text>
    <text x="927" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">+966 pre-filled · numeric KB</text>
  </g>
  <line x1="1020" y1="160" x2="1055" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- D2 OTP OK? -->
  <g class="node" data-tip="OTP sent via WhatsApp — not SMS. WhatsApp has over 90% penetration in Saudi Arabia and SMS is often filtered as spam. Auto-read on iOS and Android reduces friction significantly. This is drop-off risk #2.">
    <polygon points="1105,160 1157,134 1209,160 1157,186" fill="#B8965A"/>
    <text x="1157" y="164" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">OTP OK?</text>
  </g>
  <!-- D2 No -->
  <line x1="1157" y1="186" x2="1157" y2="256" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="1167" y="226" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">No</text>
  <g class="node" data-tip="Drop-off #2 — Wrong or expired OTP. Allow 3 attempts then offer resend. After 3 resends, surface a 'contact clinic' fallback. Never hard-lock the account — the patient may have a real appointment booked.">
    <rect x="1107" y="256" width="100" height="44" rx="8" fill="#C4856A"/>
    <text x="1157" y="272" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Retry / resend</text>
    <text x="1157" y="289" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.75)" font-family="Jost,sans-serif">Max 3 attempts</text>
  </g>
  <path d="M1157 300 L1157 390 L927 390 L927 184" fill="none" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="1040" y="405" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Re-enter number or resend</text>
  <!-- D2 Yes -->
  <line x1="1209" y1="160" x2="1244" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="1224" y="150" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Yes</text>

  <!-- 4 Name + language -->
  <g class="node" data-tip="Collect first name only — enough for personalisation ('Welcome, Layla'). Language shown as two large buttons: English and العربية. Selecting Arabic flips the entire app to RTL instantly. This moment should feel magical, not like a settings screen.">
    <rect x="1244" y="136" width="190" height="48" rx="8" fill="#7A5AA0"/>
    <text x="1339" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Name + language</text>
    <text x="1339" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">First name · English or عربية</text>
  </g>
  <line x1="1434" y1="160" x2="1472" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- D3 WhatsApp consent -->
  <g class="node" data-tip="Legally required under Saudi PDPL before any outbound WhatsApp messaging. Frame as a benefit — 'Get appointment reminders and aftercare tips on WhatsApp' — not a consent checkbox. If framed correctly, opt-in rate should exceed 85%.">
    <polygon points="1526,160 1578,134 1630,160 1578,186" fill="#B8965A"/>
    <text x="1578" y="156" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#fff" font-family="Jost,sans-serif">WhatsApp</text>
    <text x="1578" y="170" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#fff" font-family="Jost,sans-serif">consent?</text>
  </g>
  <!-- D3 No -->
  <line x1="1578" y1="186" x2="1578" y2="256" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="1588" y="226" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">No</text>
  <g class="node" data-tip="Drop-off risk #3 — Patient declines WhatsApp reminders. They can still proceed — never block. Flag this patient for manual follow-up by clinic staff. No-show probability is significantly higher for patients who decline reminders.">
    <rect x="1528" y="256" width="100" height="44" rx="8" fill="#C4856A"/>
    <text x="1578" y="272" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">No reminders</text>
    <text x="1578" y="289" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.75)" font-family="Jost,sans-serif">No-show risk ↑</text>
  </g>
  <!-- Rejoin -->
  <path d="M1578 300 L1578 440 L1730 440 L1730 184" fill="none" stroke="#C9B99A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <!-- D3 Yes -->
  <line x1="1630" y1="160" x2="1672" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="1649" y="150" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Yes</text>

  <!-- 5 Welcome screen -->
  <g class="node" data-tip="The welcome screen is the emotional payoff of onboarding. Shows the patient's first name, the clinic name, and their membership status. If the clinic pre-loaded an existing appointment, surface it here immediately — this is the wow moment that makes the signup friction worthwhile.">
    <rect x="1672" y="136" width="185" height="48" rx="8" fill="#2A7A6A"/>
    <text x="1764" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Welcome screen</text>
    <text x="1764" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">'Welcome Layla' · clinic brand</text>
  </g>
  <line x1="1857" y1="160" x2="1896" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- D4 Appt loaded? -->
  <g class="node" data-tip="If the clinic pre-loaded the patient's appointment into the system, show the appointment card immediately on the home screen. This is the single highest-value moment in the entire onboarding — the patient sees their appointment without doing anything else.">
    <polygon points="1946,160 1998,134 2050,160 1998,186" fill="#B8965A"/>
    <text x="1998" y="156" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Appt</text>
    <text x="1998" y="170" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#fff" font-family="Jost,sans-serif">loaded?</text>
  </g>

  <!-- D4 Yes — down to outcome A -->
  <line x1="1998" y1="186" x2="1998" y2="256" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="2010" y="226" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">Yes</text>
  <g class="node" data-tip="Outcome A — Best case. Patient sees their upcoming appointment card with Confirm Attendance and Reschedule buttons. They are immediately engaged and in the no-show prevention loop. WhatsApp reminders are automatically scheduled for 48h and 2h before.">
    <rect x="1938" y="256" width="120" height="48" rx="8" fill="#3A6BA0"/>
    <text x="1998" y="274" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Appointment card</text>
    <text x="1998" y="291" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">Confirm or reschedule</text>
  </g>
  <line x1="2058" y1="280" x2="2110" y2="280" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <ellipse cx="2165" cy="280" rx="60" ry="24" fill="#3A6BA0"/>
  <text x="2165" y="284" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Activated ✓</text>

  <!-- D4 No — right to book CTA -->
  <line x1="2050" y1="160" x2="2100" y2="160" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="2072" y="150" text-anchor="middle" font-size="10" fill="#9B8778" font-family="Jost,sans-serif">No</text>
  <g class="node" data-tip="If no appointment is pre-loaded, never show an empty home screen — that is a dead end. Show a single prominent CTA: 'Book your first treatment'. The entire booking flow (treatment → provider → slot → confirm) should take under 3 minutes.">
    <rect x="2100" y="136" width="120" height="48" rx="8" fill="#7A5AA0"/>
    <text x="2160" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Book first</text>
    <text x="2160" y="172" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">treatment CTA</text>
  </g>
  <line x1="2160" y1="184" x2="2160" y2="256" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <g class="node" data-tip="Outcome B — Patient completes their first booking. System immediately schedules WhatsApp reminders: 48h and 2h before the appointment. Onboarding is complete and the no-show prevention loop is live.">
    <rect x="2100" y="256" width="120" height="48" rx="8" fill="#3A6BA0"/>
    <text x="2160" y="274" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Booking confirmed</text>
    <text x="2160" y="291" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgba(255,255,255,0.72)" font-family="Jost,sans-serif">Reminders scheduled</text>
  </g>
  <line x1="2160" y1="304" x2="2160" y2="360" stroke="#C9B99A" stroke-width="1.5"/>
  <line x1="2160" y1="360" x2="2165" y2="360" stroke="#C9B99A" stroke-width="1.5" marker-end="url(#a)"/>
  <ellipse cx="2165" cy="384" rx="60" ry="24" fill="#3A6BA0"/>
  <text x="2165" y="388" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#fff" font-family="Jost,sans-serif">Activated ✓</text>

  <!-- MINIMUM FIELDS CALLOUT -->
  <line x1="1339" y1="184" x2="1339" y2="460" stroke="#C9B99A" stroke-width="0.5" stroke-dasharray="3 3"/>
  <rect x="1247" y="460" width="185" height="106" rx="8" fill="#fff" stroke="#EDE5D8" stroke-width="1"/>
  <text x="1339" y="478" text-anchor="middle" font-size="10" font-weight="500" fill="#2C2118" font-family="Jost,sans-serif">Minimum profile fields</text>
  <text x="1262" y="496" font-size="10" fill="#6B5744" font-family="Jost,sans-serif">· Mobile number (identity)</text>
  <text x="1262" y="512" font-size="10" fill="#6B5744" font-family="Jost,sans-serif">· First name (personalisation)</text>
  <text x="1262" y="528" font-size="10" fill="#6B5744" font-family="Jost,sans-serif">· Language preference</text>
  <text x="1262" y="544" font-size="10" fill="#6B5744" font-family="Jost,sans-serif">· WhatsApp consent (PDPL)</text>

  </svg>
  </div>
</div>

<div class="zoom-controls">
  <button class="zb" onclick="zoom(1.15)" title="Zoom in">+</button>
  <button class="zb" onclick="zoom(0.87)" title="Zoom out">−</button>
  <button class="zb" onclick="resetZoom()" title="Fit to screen" style="font-size:11px;">Fit</button>
</div>

<script>
  const tooltip = document.getElementById('tooltip');
  let scale = 1;

  document.querySelectorAll('[data-tip]').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('mouseenter', e => { tooltip.style.opacity = '1'; });
    el.addEventListener('mousemove', e => {
      tooltip.textContent = el.dataset.tip;
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = Math.min(window.innerHeight - 120, e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
  });

  const zt = document.getElementById('zoom-target');

  function zoom(f) {
    scale = Math.min(2.5, Math.max(0.25, scale * f));
    zt.style.transform = `scale(${scale})`;
  }

  function resetZoom() {
    const canvas = document.getElementById('canvas');
    const fw = canvas.clientWidth / 2240;
    const fh = (canvas.clientHeight) / 580;
    scale = Math.min(fw, fh) * 0.95;
    zt.style.transform = `scale(${scale})`;
  }

  window.addEventListener('load', resetZoom);
  window.addEventListener('resize', resetZoom);

  const canvas = document.getElementById('canvas');
  let dragging = false, sx, sy, sl, st;
  canvas.addEventListener('mousedown', e => {
    dragging = true; sx = e.pageX; sy = e.pageY;
    sl = canvas.scrollLeft; st = canvas.scrollTop;
  });
  canvas.addEventListener('mouseleave', () => dragging = false);
  canvas.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    e.preventDefault();
    canvas.scrollLeft = sl - (e.pageX - sx);
    canvas.scrollTop = st - (e.pageY - sy);
  });
</script>

</body>
</html>
